name: Deploy to Vercel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        run: |
          DEPLOY_URL=$(npx vercel --prod --yes 2>&1 | grep -o 'https://[^ ]*' | tail -1)
          echo "Deployed: $DEPLOY_URL"
          npx vercel alias set "$DEPLOY_URL" sundol.vercel.app
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_XkcSojL4wVy54NWOdbX6NJNk
          VERCEL_PROJECT_ID: prj_1PsK50o4GxChkzq12IQLwEJjVhbH
